[colors]
background = #1A1A1A
background-alt = #2A2A2A
foreground = #CCCCCC
foreground-alt = #555555
primary = #E62117
secondary = #315387
alert = #E62117
disabled = #555555
dark-gray = #000000
warning = #E62117
muted = #555555

[bar/example]
width = 100%
height = 18pt
radius = 0

bottom = true
wm-name = herbstluftwm
offset-y = 0
offset-x = 0
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1pt

border-size = 1pt
border-color = ${colors.dark-gray}

padding-left = 0 # makes modules offset
padding-right = 0

module-margin = 0

separator = " : "
separator-foreground = ${colors.foreground-alt}

font-0 = UbuntuMono;2

modules-left = xworkspaces systray 
modules-right = wlan eth pulseaudio xkeyboard memory cpu battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 4pt
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = [%name%]
label-active-foreground = ${colors.background}
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.secondary}
label-active-padding = 1

label-occupied = [%name%]
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = [!%name%!]
label-urgent-foreground = ${colors.background}
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = [.%name%.]
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#315387}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>

label-volume = VOL:%percentage%%

label-muted = VOL:MUTE
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = KB:%layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
label = RAM:%percentage_used:2%%
label-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
label = CPU:%percentage:2%%
label-foreground = ${colors.primary}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-connected-foreground = ${colors.primary}
format-disconnected-foreground = ${colors.disabled}
label-disconnected = NET:%{F#E62117}%ifname%%{F#555555} down

[module/wlan]
inherit = network-base
interface-type = wireless
unknown-as-up = true
label-connected = %{A1:kitty --config /home/asuker/.config/atta-wm/configs/wm-configs/kitty.conf -e nmtui connect &:}%{A3:kitty --config /home/asuker/.config/atta-wm/configs/wm-configs/kitty.conf -e nmtui connect &:}WLAN:%{F#315387}%essid%%{F-} %local_ip%%{A}%{A}
label-disconnected = %{A1:kitty --config /home/asuker/.config/atta-wm/configs/wm-configs/kitty.conf -e nmtui connect &:}%{A3:kitty --config /home/asuker/.config/atta-wm/configs/wm-configs/kitty.conf -e nmtui connect &:}WLAN:%{F#E62117}down%{F-}%{A}%{A}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{A1:kitty --config /home/asuker/.config/atta-wm/configs/wm-configs/kitty.conf -e nmtui connect &:}%{A3:kitty --config /home/asuker/.config/atta-wm/configs/wm-configs/kitty.conf -e nmtui connect &:}ETH:%{F#315387}%ifname%%{F-} %local_ip%%{A}%{A}
label-disconnected = %{A1:kitty --config /home/asuker/.config/atta-wm/configs/wm-configs/kitty.conf -e nmtui connect &:}%{A3:kitty --config /home/asuker/.config/atta-wm/configs/wm-configs/kitty.conf -e nmtui connect &:}ETH:%{F#555555}down%{F-}%{A}%{A}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = [%date%]
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 5

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
format-low = <label-low>

label-charging = %{A1:rofi -e "$(upower -i /org/freedesktop/UPower/devices/DisplayDevice | grep -e state -e time -e percentage)" -theme-str 'window {location\\: south east; width\\: 250px; y-offset\\: -35px; x-offset\\: -10px;}':}BAT:+%percentage%%%{A}
label-discharging = %{A1:rofi -e "$(upower -i /org/freedesktop/UPower/devices/DisplayDevice | grep -e state -e time -e percentage)" -theme-str 'window {location\\: south east; width\\: 250px; y-offset\\: -35px; x-offset\\: -10px;}':}BAT:-%percentage%%%{A}
label-full = %{A1:rofi -e "$(upower -i /org/freedesktop/UPower/devices/DisplayDevice | grep -e state -e time -e percentage)" -theme-str 'window {location\\: south east; width\\: 250px; y-offset\\: -35px; x-offset\\: -10px;}':}BAT:FULL%{A}
label-low = %{A1:rofi -e "$(upower -i /org/freedesktop/UPower/devices/DisplayDevice | grep -e state -e time -e percentage)" -theme-str 'window {location\\: south east; width\\: 250px; y-offset\\: -35px; x-offset\\: -10px;}':}BAT:LOW %percentage%%%{A}

label-charging-foreground = ${colors.secondary}
label-discharging-foreground = ${colors.primary}
label-full-foreground = ${colors.secondary}
label-low-foreground = ${colors.alert}

