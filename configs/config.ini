[colors]
background = #334C4C
background-alt = #5E6969
foreground = #BDBDBD
foreground-alt = #5E9E9E
primary = #8D1B1B
secondary = #5E9E9E
alert = #8D1B1B
disabled = #5E6969
dark-gray = #1A2626
warning = #C4A24E
muted = #5E6969

[bar/example]
width = 100%
height = 20pt
radius = 0

bottom = true
wm-name = herbstluftwm
offset-y = 0
offset-x = 0
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0
border-color = ${colors.dark-gray}

padding-left = 0 # makes modules offset
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.primary}

font-0 = Ubuntu Mono;2

modules-left = xworkspaces systray 
modules-right = netmanager pulseaudio xkeyboard memory cpu eth battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#5E9E9E}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#C4A24E}%ifname%%{F#5E6969} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#5E9E9E}%ifname%%{F-} %essid% %local_ip%
label-disconnected = %{F#5E9E9E}%ifname%%{F-} disconnected

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#5E9E9E}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 5

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

[module/netmanager]
type = custom/script
label = "WLAN"
label-font = Noto Sans Mono:style=Regular
interval = 999
; Necessary placeholder for the module to display
exec = echo "a"
