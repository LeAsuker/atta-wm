# Generated from templates/kitty.conf.erb and configs/colors.yaml.

# Font
font_family      Ubuntu Mono
font_size        11
disable_ligatures always

# No frills
enable_audio_bell no
visual_bell_duration 0
window_alert_on_bell no
bell_on_tab no
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
scrollback_lines 2000
mouse_hide_wait 0

# Stripped-down chrome
tab_bar_style hidden
window_padding_width 1
placement_strategy top-left
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size no
initial_window_width 80c
initial_window_height 24c

# Colors
background       #000080
foreground       #C0C0C0
cursor           #00FF00
cursor_text_color #000080
selection_foreground #000080
selection_background #00FF00

# normal
color0  #000000
color1  #FF0000
color2  #00FF00
color3  #FFFF00
color4  #3A6EA5
color5  #00FF00
color6  #00FF00
color7  #FFFFFF

# bright
color8  #808080
color9  #FF0000
color10 #00FF00
color11 #FFFF00
color12 #3A6EA5
color13 #00FF00
color14 #00FF00
color15 #000080
