# Generated from templates/kitty.conf.erb and configs/colors.yaml.

# Font
font_family      Ubuntu Mono
font_size        11
disable_ligatures always

# No frills
enable_audio_bell no
visual_bell_duration 0
window_alert_on_bell no
bell_on_tab no
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
scrollback_lines 2000
mouse_hide_wait 0

# Stripped-down chrome
tab_bar_style hidden
window_padding_width 1
placement_strategy top-left
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size no
initial_window_width 80c
initial_window_height 24c

# Colors
background       #1A1A1A
foreground       #CCCCCC
cursor           #315387
cursor_text_color #1A1A1A
selection_foreground #1A1A1A
selection_background #315387

# normal
color0  #000000
color1  #E62117
color2  #315387
color3  #E62117
color4  #315387
color5  #E62117
color6  #315387
color7  #CCCCCC

# bright
color8  #555555
color9  #E62117
color10 #315387
color11 #E62117
color12 #315387
color13 #E62117
color14 #315387
color15 #1A1A1A
